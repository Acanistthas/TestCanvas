<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #viewport {
            width: 95vw;
            height: 65vh; /* Take up more vertical space on mobile */
            margin: 10px auto;
            border: 2px solid #0088cc;
            position: relative;
            overflow: auto; /* Enables native scrolling */
            background: #000;
            border-radius: 10px;
            /* This allows the container to handle gestures better */
            touch-action: pan-x pan-y; 
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            /* This is the secret: 'initialScale' will be set by JS */
            width: 100%; 
            height: auto;
        }
        .toolbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 90%; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; background: #333; color: white; font-weight: bold; cursor: pointer; }
        button.active { background: #0088cc; border: 2px solid white; }
        .controls { width: 90%; margin: 15px 0; background: #1c1c1c; padding: 15px; border-radius: 10px; display: none; }
        #upload-btn { background: #222; border: 2px dashed #444; padding: 40px; width: 80%; margin-top: 50px; text-align: center; border-radius: 15px; }
        .btn-gen { background: #0088cc; width: 90%; padding: 18px; margin-top: 10px; font-size: 16px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="upload-btn" onclick="document.getElementById('fileInput').click()">
        <strong>[+] UPLOAD PHOTO</strong><br><small>1440x1800 supported</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div id="editor-ui" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <div id="viewport">
            <canvas id="photoCanvas"></canvas>
            <canvas id="maskCanvas"></canvas>
        </div>

        <div class="toolbar">
            <button id="moveBtn" onclick="setMode('move')">🖐️ Move</button>
            <button id="brushBtn" class="active" onclick="setMode('brush')">🖌️ Brush</button>
            <button id="eraseBtn" onclick="setMode('erase')">🧽 Eraser</button>
        </div>

        <div class="controls" id="mainControls" style="display:block">
            <label>Zoom: <span id="zVal">1x</span></label>
            <input type="range" min="1" max="4" step="0.1" value="1" style="width:100%" oninput="updateZoom(this.value)">
            
            <label>Brush Size</label>
            <input type="range" id="sizeRange" min="5" max="80" value="30" style="width:100%">

            <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="undo()" style="background:#444">↩️ Undo</button>
                <button onclick="clearMask()" style="background:#600">🗑️ Clear</button>
            </div>
        </div>

        <button class="btn-gen" onclick="sendToBot()">🔥 GENERATE RESULTS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const pCanvas = document.getElementById('photoCanvas');
        const mCanvas = document.getElementById('maskCanvas');
        const pCtx = pCanvas.getContext('2d');
        const mCtx = mCanvas.getContext('2d');

        let drawing = false, mode = 'brush', zoom = 1, history = [];
        let lastX, lastY; // To fix the "dots" issue

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                
                // --- PASTE YOUR NEW BLOCK HERE ---
                img.onload = function() {
                    document.getElementById('upload-btn').style.display = 'none';
                    document.getElementById('editor-ui').style.display = 'flex';
                    
                    const viewport = document.getElementById('viewport');
                    const screenWidth = viewport.clientWidth;
                    
                    const internalW = 1024; 
                    const ratio = internalW / img.width;
                    const internalH = img.height * ratio;
                    
                    [pCanvas, mCanvas].forEach(c => {
                        c.width = internalW;
                        c.height = internalH;
                        c.style.width = screenWidth + "px";
                        c.style.height = (internalH * (screenWidth / internalW)) + "px";
                    });
    
                    pCtx.drawImage(img, 0, 0, internalW, internalH);
                    saveState();
                };
                // --- END OF NEW BLOCK ---
    
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function updateZoom(v) {
            zoom = v;
            document.getElementById('zVal').innerText = v + "x";
            
            const scale = v;
            pCanvas.style.transform = `scale(${scale})`;
            mCanvas.style.transform = `scale(${scale})`;
        
            // If we are in Move mode, we allow the viewport to scroll
            if (mode === 'move') {
                mCanvas.style.pointerEvents = 'none';
                document.getElementById('viewport').style.overflow = 'auto';
            } else {
                mCanvas.style.pointerEvents = 'auto';
                // Lock scrolling while drawing to prevent accidental sliding
                document.getElementById('viewport').style.overflow = 'hidden';
            }
        }
        function setMode(m) {
            mode = m;
            document.getElementById('moveBtn').className = m === 'move' ? 'active' : '';
            document.getElementById('brushBtn').className = m === 'brush' ? 'active' : '';
            document.getElementById('eraseBtn').className = m === 'erase' ? 'active' : '';
            mCanvas.style.pointerEvents = m === 'move' ? 'none' : 'auto';
        }

        mCanvas.onpointerdown = (e) => {
            if (mode === 'move') return;
            drawing = true;
            saveState();
            const rect = mCanvas.getBoundingClientRect();
            lastX = (e.clientX - rect.left) * (mCanvas.width / rect.width);
            lastY = (e.clientY - rect.top) * (mCanvas.height / rect.height);
        };

        mCanvas.onpointermove = (e) => {
            if (!drawing || mode === 'move') return;
            const rect = mCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (mCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (mCanvas.height / rect.height);

            mCtx.lineWidth = document.getElementById('sizeRange').value;
            mCtx.lineCap = 'round';
            mCtx.lineJoin = 'round';
            mCtx.globalCompositeOperation = mode === 'brush' ? 'source-over' : 'destination-out';
            mCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';

            mCtx.beginPath();
            mCtx.moveTo(lastX, lastY);
            mCtx.lineTo(x, y);
            mCtx.stroke();
            
            [lastX, lastY] = [x, y];
        };

        window.onpointerup = () => drawing = false;

        function saveState() { history.push(mCanvas.toDataURL()); if(history.length > 10) history.shift(); }
        function undo() { if(history.length > 1) { history.pop(); let i = new Image(); i.onload = () => { mCtx.clearRect(0,0,768,mCanvas.height); mCtx.drawImage(i,0,0); }; i.src = history[history.length-1]; } }
        function clearMask() { mCtx.clearRect(0,0,768,mCanvas.height); saveState(); }

        function sendToBot() {
            const final = document.createElement('canvas');
            final.width = 768; final.height = mCanvas.height;
            const fCtx = final.getContext('2d');
            fCtx.drawImage(pCanvas, 0, 0);
            fCtx.drawImage(mCanvas, 0, 0);
            tg.sendData(final.toDataURL("image/png"));
        }
    </script>
</body>
</html>
