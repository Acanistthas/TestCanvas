<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Make the canvas container flexible and large */
        #canvas-viewport {
            width: 95vw;
            height: 95vw;
            max-width: 500px; /* How big it looks on screen */
            max-height: 500px;
            margin: 10px auto;
            overflow: auto; 
            border: 2px solid #0088cc;
            background: #000;
            position: relative;
            border-radius: 10px;
            touch-action: none;
        }

        #mainCanvas {
            width: 100%;
            height: 100%;
            display: block;
            transform-origin: top left;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 90%;
            margin: 10px 0;
            background: #1c1c1c;
            padding: 10px;
            border-radius: 8px;
        }
    </style>

<div class="section-title">Step 1: Paint the Area</div>

<div id="canvas-viewport">
    <canvas id="mainCanvas"></canvas>
</div>

<div class="zoom-controls">
    <span>🔍</span>
    <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
    <span id="zoomVal">1x</span>
</div>
    </style>
</head>
<body>

    <div id="upload-btn" onclick="document.getElementById('fileInput').click()">
        <strong>[+] UPLOAD PHOTO</strong><br><small>Tap to start painting</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div id="editor-ui" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="section-title">Drawing Tools</div>
        <div class="toolbar">
            <button id="brushBtn" class="active" onclick="setMode('brush')">🖌️ Brush</button>
            <button id="eraseBtn" onclick="setMode('erase')">🧽 Eraser</button>
            <button onclick="undo()">↩️ Undo</button>
        </div>
        
        <div style="width:90%; margin: 15px 0;">
            <label>Brush Size</label>
            <input type="range" id="sizeRange" min="5" max="60" value="25" style="width:100%">
        </div>

        <div class="section-title">Body Parameters</div>
        <div class="params-grid">
            <div class="control-group">
                <label>Dress Type</label>
                <select id="dressType">
                    <option value="nude">Nude</option>
                    <option value="nudewithtattoo">Nude with Tattoo</option>
                    <option value="bikini">Bikini</option>
                    <option value="lingerie">Lingerie</option>
                    <option value="swimsuit">Swimsuit</option>
                    <option value="bodysuit">Bodysuit</option>
                </select>
            </div>
            <div class="control-group">
                <label>Body Type</label>
                <select id="bodyType">
                    <option value="slim">Slim</option>
                    <option value="normal">Normal</option>
                    <option value="athletic">Athletic</option>
                    <option value="fat">Fat</option>
                </select>
            </div>
            <div class="control-group">
                <label>Breast</label>
                <select id="breastType">
                    <option value="natural">Small</option>
                    <option value="medium">Medium</option>
                    <option value="big">Big</option>
                    <option value="huge">Huge</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vagina</label>
                <select id="vaginaType">
                    <option value="hairy">Hairy</option>
                    <option value="shaved">Shaved</option>
                    <option value="brazillian">Brazillian</option>
                </select>
            </div>
        </div>

        <button class="btn-gen" onclick="sendToBot()">🔥 GENERATE RESULTS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        let drawing = false;
        let mode = 'brush';
        let history = [];
        let bgImage = null;
        let currentZoom = 1;
        
        // --- SECTION 1: THE PHOTO LOADER (reader.onload) ---
        // This triggers the moment the user picks a file
        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                bgImage = new Image();
                bgImage.onload = function() {
                    // Hide the upload button, show the editor
                    document.getElementById('upload-btn').style.display = 'none';
                    document.getElementById('editor-ui').style.display = 'flex';
                    
                    // 1. SET THE RESOLUTION TO 768x768
                    canvas.width = 768;
                    canvas.height = 768;
        
                    // 2. THE "NO GAP" MATH (Center Crop/Fill)
                    // This ensures the photo fills the 768x768 square completely
                    const scale = Math.max(canvas.width / bgImage.width, canvas.height / bgImage.height);
                    const x = (canvas.width / 2) - (bgImage.width / 2) * scale;
                    const y = (canvas.height / 2) - (bgImage.height / 2) * scale;
        
                    // 3. DRAW THE PHOTO
                    ctx.drawImage(bgImage, x, y, bgImage.width * scale, bgImage.height * scale);
                    saveState(); // Save this as the "Base" for Undo
                }
                bgImage.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };
        
        // --- SECTION 2: DRAWING & BRUSH LOGIC ---
        // This handles the white paint on the 768px canvas
        function draw(e) {
            if (!drawing) return;
            
            // Get the size of the canvas as it appears on the phone screen
            const rect = canvas.getBoundingClientRect();
            
            // Convert screen touches to the internal 768px coordinates
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
        
            // Apply the math to find exactly where the finger is
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
        
            // Brush settings
            ctx.lineWidth = document.getElementById('sizeRange').value * (768 / 500); 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (mode === 'brush') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; // Semi-transparent white
            } else {
                ctx.globalCompositeOperation = 'destination-out'; // Eraser mode
            }
        
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
        
        // --- SECTION 3: UTILS (Undo, Zoom, Mode) ---
        function setMode(m) { 
            mode = m; 
            document.getElementById('brushBtn').classList.toggle('active', mode === 'brush');
            document.getElementById('eraseBtn').classList.toggle('active', mode === 'erase');
        }
        
        function applyZoom(val) {
            currentZoom = val;
            document.getElementById('zoomVal').innerText = val + "x";
            canvas.style.transform = `scale(${val})`;
        }
        
        function saveState() {
            if (history.length > 15) history.shift();
            history.push(canvas.toDataURL());
        }
        
        function undo() {
            if (history.length > 1) {
                history.pop();
                let img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, 768, 768);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[history.length - 1];
            }
        }
        
        // --- SECTION 4: TOUCH LISTENERS ---
        canvas.onpointerdown = (e) => { drawing = true; saveState(); draw(e); };
        canvas.onpointerup = () => { drawing = false; ctx.beginPath(); };
        canvas.onpointermove = draw;
        
        // --- SECTION 5: SEND TO BOT ---
        function sendToBot() {
            const dress = document.getElementById('dressType').value;
            const body = document.getElementById('bodyType').value;
            const breast = document.getElementById('breastType').value;
            const vagina = document.getElementById('vaginaType').value;
            
            // The dataString sent back to your Python script
            const dataString = `${canvas.toDataURL("image/png")}|${dress}|${body}|${breast}|${vagina}`;
            tg.sendData(dataString);
        }
    </script>
</body>
</html>
