<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<div class="container">
    <div id="upload-zone" onclick="document.getElementById('imageLoader').click()">
        <canvas id="paintCanvas"></canvas>
        <div id="upload-placeholder">[+] upload photo</div>
    </div>
    <input type="file" id="imageLoader" accept="image/*" style="display:none;">

    <div class="controls">
        <p>Adjust these parameters to change result based on your preferences!:</p>

         <div class="param-row">
            <label>Dress Type:</label>
            <select id="dressType">
                <option value="nude">Nude</option>
                 <option value="nudewithtattoo">Nude with Tattoo</option>
                <option value="bikini">Bikini</option>
                <option value="lingerie">Lingerie</option>
                <option value="swimsuit">Swimsuit</option>
                <option value="bodysuit">Bodysuit</option>
            </select>
        </div>
        
        <div class="param-row">
            <label>Body Type:</label>
            <select id="bodyType">
                <option value="slim">Slim</option>
                <option value="normal">Normal</option>
                <option value="athletic">Athletic</option>
                <option value="fat">Fat</option>
            </select>
        </div>

        <div class="param-row">
            <label>Breast Type:</label>
            <select id="breastType">
                <option value="natural">Small</option>
                <option value="medium">Medium</option>
                <option value="big">Big</option>
                <option value="huge">Huge</option>
            </select>
        </div>

        <div class="param-row">
            <label>Vagina Type:</label>
            <select id="vaginaType">
                <option value="hairy">Hairy</option>
                <option value="shaved">Shaved</option>
                <option value="brazillian">Brazillian</option>
            </select>
        </div>

        <button class="btn-send" onclick="sendData()">GENERATE</button>
        <button class="btn-clear" onclick="clearCanvas()">Go Back / Clear</button>
    </div>
</div>

<script>
    function sendData() {
        const dress = document.getElementById('dressType').value;
        const body = document.getElementById('bodyType').value;
        const breast = document.getElementById('breastType').value;
        const vagina = document.getElementById('vaginaType').value;
        
        // Create Mask
        const maskData = canvas.toDataURL("image/png");

        // Combine all data into one string for Python to read
        const payload = `${maskData}|${dress}|${body}|${breast}|${vagina}`;
        tg.sendData(payload);
    }
</script>
