<div class="container">
    <canvas id="paintCanvas"></canvas>
    
    <div class="controls">
        <p>Step 2: Choose your Style</p>
        <select id="bodyType">
            <option value="slender">Slender Body</option>
            <option value="athletic">Athletic/Toned</option>
            <option value="heavy">Stocky/Broad</option>
        </select>

        <select id="outfitType">
            <option value="business suit">Business Suit</option>
            <option value="formal tuxedo">Formal Tuxedo</option>
            <option value="casual summer outfit">Casual Wear</option>
        </select>
        
        <button class="btn-send" onclick="sendData()">Generate 2 Batches</button>
    </div>
</div>

<script>
    function sendData() {
        const canvas = document.getElementById('paintCanvas');
        const body = document.getElementById('bodyType').value;
        const outfit = document.getElementById('outfitType').value;

        // Create the B&W Mask
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.fillStyle = "black";
        tCtx.fillRect(0,0,canvas.width,canvas.height);
        tCtx.drawImage(canvas, 0, 0);
        
        const maskBase64 = tempCanvas.toDataURL("image/png");

        // We combine everything into one string using a separator like "|"
        const combinedData = `${maskBase64}|${body}|${outfit}`;
        
        tg.sendData(combinedData); 
    }
</script>
