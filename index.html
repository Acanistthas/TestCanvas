<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Make the canvas container flexible and large */
        #canvas-viewport {
            width: 95vw;
            height: 80vh; /* Increased height for better scrolling */
            margin: 10px auto;
            border: 2px solid #0088cc;
            background: #000;
            position: relative;
            overflow: auto; /* This allows the scrollbars to appear when zoomed */
            border-radius: 10px;
            touch-action: none; 
        }
    
        /* Both canvases must be the exact same size and stack perfectly */
        .drawing-layer {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            transition: transform 0.1s ease-out;
        }
    </style>

<div class="section-title">Step 1: Paint the Area</div>

<div id="canvas-viewport">
    <canvas id="photoCanvas" class="drawing-layer"></canvas>
    <canvas id="maskCanvas" class="drawing-layer"></canvas>
</div>

<div class="zoom-controls">
    <span>🔍</span>
    <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
    <span id="zoomVal">1x</span>
</div>
    </style>
</head>
<body>

    <div id="upload-btn" onclick="document.getElementById('fileInput').click()">
        <strong>[+] UPLOAD PHOTO</strong><br><small>Tap to start painting</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div id="editor-ui" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="section-title">Drawing Tools</div>
        <div class="toolbar">
            <button id="brushBtn" class="active" onclick="setMode('brush')">🖌️ Brush</button>
            <button id="eraseBtn" onclick="setMode('erase')">🧽 Eraser</button>
            <button onclick="undo()">↩️ Undo</button>
        </div>
        
        <div style="width:90%; margin: 15px 0;">
            <label>Brush Size</label>
            <input type="range" id="sizeRange" min="5" max="60" value="25" style="width:100%">
        </div>

        <div class="section-title">Body Parameters</div>
        <div class="params-grid">
            <div class="control-group">
                <label>Dress Type</label>
                <select id="dressType">
                    <option value="nude">Nude</option>
                    <option value="nudewithtattoo">Nude with Tattoo</option>
                    <option value="bikini">Bikini</option>
                    <option value="lingerie">Lingerie</option>
                    <option value="swimsuit">Swimsuit</option>
                    <option value="bodysuit">Bodysuit</option>
                </select>
            </div>
            <div class="control-group">
                <label>Body Type</label>
                <select id="bodyType">
                    <option value="slim">Slim</option>
                    <option value="normal">Normal</option>
                    <option value="athletic">Athletic</option>
                    <option value="fat">Fat</option>
                </select>
            </div>
            <div class="control-group">
                <label>Breast</label>
                <select id="breastType">
                    <option value="natural">Small</option>
                    <option value="medium">Medium</option>
                    <option value="big">Big</option>
                    <option value="huge">Huge</option>
                </select>
            </div>
            <div class="control-group">
                <label>Vagina</label>
                <select id="vaginaType">
                    <option value="hairy">Hairy</option>
                    <option value="shaved">Shaved</option>
                    <option value="brazillian">Brazillian</option>
                </select>
            </div>
        </div>

        <button class="btn-gen" onclick="sendToBot()">🔥 GENERATE RESULTS</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const pCanvas = document.getElementById('photoCanvas');
        const mCanvas = document.getElementById('maskCanvas');
        const pCtx = pCanvas.getContext('2d');
        const mCtx = mCanvas.getContext('2d');
        
        let drawing = false;
        let mode = 'brush';
        let currentZoom = 1;
        let history = [];
        
        // 1. Load Image and Fit to 768px Width (Scrollable Height)
        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    document.getElementById('upload-btn').style.display = 'none';
                    document.getElementById('editor-ui').style.display = 'flex';
        
                    // We fix the width at 768, but let the height be dynamic based on the photo
                    const ratio = 768 / img.width;
                    const finalW = 768;
                    const finalH = img.height * ratio;
        
                    [pCanvas, mCanvas].forEach(c => {
                        c.width = finalW;
                        c.height = finalH;
                    });
        
                    pCtx.drawImage(img, 0, 0, finalW, finalH);
                    saveState();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };
        
        // 2. Zoom Functionality
        function applyZoom(val) {
            currentZoom = val;
            document.getElementById('zoomVal').innerText = val + "x";
            // Apply zoom to BOTH layers simultaneously
            pCanvas.style.transform = `scale(${val})`;
            mCanvas.style.transform = `scale(${val})`;
        }
        
        // 3. Drawing Logic (Targeting the Mask Layer)
        function draw(e) {
            if (!drawing) return;
            const rect = mCanvas.getBoundingClientRect();
            
            // Math to ensure brush stays under finger during zoom
            const x = (e.clientX - rect.left) * (mCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (mCanvas.height / rect.height);
        
            mCtx.lineWidth = document.getElementById('sizeRange').value * (768 / 400);
            mCtx.lineCap = 'round';
            mCtx.lineJoin = 'round';
        
            if (mode === 'brush') {
                mCtx.globalCompositeOperation = 'source-over';
                mCtx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; // Paint white
            } else {
                mCtx.globalCompositeOperation = 'destination-out'; // Erase only the paint
            }
        
            mCtx.lineTo(x, y);
            mCtx.stroke();
            mCtx.beginPath();
            mCtx.moveTo(x, y);
        }
        
        // 4. Input Listeners
        mCanvas.onpointerdown = (e) => { 
            // If not zoomed, we draw. If zoomed, you can still draw or scroll.
            drawing = true; 
            saveState(); 
            draw(e); 
        };
        mCanvas.onpointerup = () => { drawing = false; mCtx.beginPath(); };
        mCanvas.onpointermove = draw;
        
        function setMode(m) { 
            mode = m; 
            document.getElementById('brushBtn').className = (m === 'brush' ? 'active' : '');
            document.getElementById('eraseBtn').className = (m === 'erase' ? 'active' : '');
        }
        
        function applyZoom(val) {
            currentZoom = val;
            document.getElementById('zoomVal').innerText = val + "x";
            canvas.style.transform = `scale(${val})`;
        }
        
        function saveState() {
            if (history.length > 15) history.shift();
            history.push(canvas.toDataURL());
        }
        
        function undo() {
            if (history.length > 1) {
                history.pop();
                let img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, 768, 768);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[history.length - 1];
            }
        }
        
        // --- SECTION 4: TOUCH LISTENERS ---
        canvas.onpointerdown = (e) => { drawing = true; saveState(); draw(e); };
        canvas.onpointerup = () => { drawing = false; ctx.beginPath(); };
        canvas.onpointermove = draw;
        
        // --- SECTION 5: SEND TO BOT ---
        function sendToBot() {
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = 768; finalCanvas.height = 768;
            const fCtx = finalCanvas.getContext('2d');
            
            // Draw photo, then draw mask on top
            fCtx.drawImage(photoCanvas, 0, 0);
            fCtx.drawImage(maskCanvas, 0, 0);
            
            const dress = document.getElementById('dressType').value;
            const body = document.getElementById('bodyType').value;
            const breast = document.getElementById('breastType').value;
            const vagina = document.getElementById('vaginaType').value;
            
            const dataString = `${finalCanvas.toDataURL("image/png")}|${dress}|${body}|${breast}|${vagina}`;
            tg.sendData(dataString);
        }
    </script>
</body>
</html>
